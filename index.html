<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monday</title>
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent 0px, transparent 3px,
        rgba(0,0,0,0.09) 3px, rgba(0,0,0,0.09) 4px
      );
      pointer-events: none; z-index: 999;
    }
    #screen {
      font-family: 'VT323', 'Lucida Console', 'Courier New', monospace;
      line-height: 1.15; white-space: pre; letter-spacing: 0;
      font-feature-settings: "kern" 0;
      filter: drop-shadow(0 0 5px rgba(100,230,255,0.45));
    }
    #screen span { display: inline-block; width: 0.555em; }
    .c0  { color:#000000 } .c1  { color:#0000AA } .c2  { color:#00AA00 }
    .c3  { color:#00AAAA } .c4  { color:#AA0000 } .c5  { color:#AA00AA }
    .c6  { color:#AA5500 } .c7  { color:#AAAAAA } .c8  { color:#555555 }
    .c9  { color:#5555FF } .c10 { color:#55FF55 } .c11 { color:#55FFFF }
    .c12 { color:#FF5555 } .c13 { color:#FF55FF } .c14 { color:#FFFF55 }
    .c15 { color:#FFFFFF }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    .blink { animation: blink 0.85s step-end infinite; }

    /* Canvas layers */
    #co2canvas, #albedocanvas {
      display: none;
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 10;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="co2canvas"></canvas>
  <canvas id="albedocanvas"></canvas>
  <pre id="screen"></pre>
  <script>
    // ================================================================
    // VGA palette
    // ================================================================
    const PAL = ['#000000','#0000AA','#00AA00','#00AAAA','#AA0000','#AA00AA',
                 '#AA5500','#AAAAAA','#555555','#5555FF','#55FF55','#55FFFF',
                 '#FF5555','#FF55FF','#FFFF55','#FFFFFF'];

    const W = 70, H = 22;
    const BORDER_PAT  = '░▒▓█▓▒░';
    const BORDER_COLS = [11,11,11,3,11,15,11,11,14,11,11,3];
    const SEP         = '═'.repeat(38);

    const LINES = [
      { t: '>>  W E L C O M E   T O   M O N D A Y  <<', c: 14 },
      { t: '', c: 0 },
      { t: 'You have three tasks to complete.', c: 15 },
      { t: '', c: 0 },
      { t: SEP, c: 8 },
      { t: '', c: 0 },
      { t: 'After completing all tasks,', c: 11 },
      { t: 'submit your screenshot in', c: 11 },
      { t: 'Google Classroom.', c: 14 },
      { t: '', c: 0 },
      { t: '[ press enter ]', c: 8, b: true },
    ];

    const ACTIVITIES = [['Glaciers and','Sea-level'],['CO₂ Greenhouse'],['Albedo']];
    const BOX_W = 20, BOX_H = 6, BOX_GAP = 4;
    const BOX_COLS = [1, 1+BOX_W+BOX_GAP, 1+2*(BOX_W+BOX_GAP)];
    const BOX_ROW  = 1 + Math.round(((H-2)-BOX_H)/2);

    // ── Core state ──────────────────────────────────────────────────
    let tick = 0, state = 'loading', selected = 0;
    let studentName = '';
    let nameEntry   = '';

    // ── Glacier state ───────────────────────────────────────────────
    let temperature=0, taskNum=1, taskDirection='raise', taskAmount=6;
    let targetSeaLevel=6, taskComplete=false, glacierTaskComplete=false;

    // ── CO2 text-mode state (for intro screen) ──────────────────────
    let co2Task = 1;

    // ── Graph quiz state ────────────────────────────────────────────
    let graphScenario='shrinking', graphQ1=0, graphQ2=0, graphStep=0;
    let slopeFactor=1.0, noiseMag=1.0;
    let graphPointsGrowing=[], graphPointsShrinking=[];

    // ── CO2 canvas sim state ─────────────────────────────────────────
    let co2Ppm    = 415;
    let co2Temp   = 1.1;
    let co2Sel    = 1;
    let co2Active = [false, false, false];
    const CO2_RATES  = [-3,   5,  12];
    const TEMP_RATES = [-0.04, 0.06, 0.14];

    // Task progression: 0=raise to +6, 1=lower to -3, 2=quiz, 3=done
    let co2TaskPhase = 0;
    let co2TaskDone  = false;   // star awarded flag

    // Quiz state
    const CO2_QUESTIONS = [
      {
        q: 'What happens to IR heat when CO₂ PPM is higher?',
        opts: ['More IR escapes to space','More IR is reflected back to Earth','IR arrows move faster','IR heat disappears'],
        ans: 1
      },
      {
        q: 'What effect did the forest have on CO₂ PPM?',
        opts: ['It increased PPM quickly','It had no effect','It slowly absorbed CO₂, reducing PPM','It emitted the most CO₂'],
        ans: 2
      },
      {
        q: 'Which source raised CO₂ PPM the fastest?',
        opts: ['The forest','The volcano','The city','All equally'],
        ans: 2
      },
      {
        q: 'What happened to global temperature as CO₂ PPM increased?',
        opts: ['It decreased','It stayed the same','It increased','It fluctuated randomly'],
        ans: 2
      }
    ];
    let co2QuizIdx  = 0;   // current question
    let co2QuizSel  = 0;   // selected answer (0-3)
    let co2QuizAnswers = [];  // recorded answers
    let co2QuizDone = false;
    let co2AllCorrect = false;

    // Particle systems
    let co2Particles = [];
    let sunRays      = [];
    let irArrows     = [];
    let escapingIR   = [];   // IR arrows that broke through atmosphere

    function initCO2Sim() {
      co2Ppm = 415; co2Temp = 1.1; co2Sel = 1;
      co2Active = [false,false,false];
      co2Particles = []; sunRays = []; irArrows = []; escapingIR = [];
      co2TaskPhase = 0;
      co2QuizIdx = 0; co2QuizSel = 0; co2QuizAnswers = [];
      co2QuizDone = false; co2AllCorrect = false;
      for (let i = 0; i < 30; i++) spawnCO2(Math.random());
      for (let i = 0; i < 8;  i++) spawnSunRay(Math.random());
      for (let i = 0; i < 4;  i++) spawnIR(Math.random());
    }


    // ── Albedo canvas sim state ──────────────────────────────────────
    // Surfaces: 0=snow, 1=ash-snow, 2=bare-earth
    // albedo values (fraction reflected): snow=0.85, ash=0.45, earth=0.15
    const ALBEDO_SURFACES = [
      { name:'SNOW',       albedo:0.85, heatRate:0.04, color:'#DDEEFF', dark:'#AACCEE', label:'Snow-covered ground' },
      { name:'ASH & SNOW', albedo:0.45, heatRate:0.30, color:'#888877', dark:'#555544', label:'Ash-covered snow'    },
      { name:'BARE EARTH', albedo:0.15, heatRate:0.65, color:'#7A5230', dark:'#4A3010', label:'Bare earth'          },
    ];
    let albSel      = 0;       // which surface is selected
    let albExplored = [false,false,false];
    let albSurfTemp = [0,0,0];  // surface temp in °C above baseline
    let albTaskPhase = 0;  // 0=explore, 1=task(raise +30), 2=quiz, 3=results

    const ALB_QUESTIONS = [
      {
        q: 'A surface with HIGH albedo reflects most sunlight. What happens to its temperature?',
        opts: ['It heats up quickly','It stays cooler','It absorbs all IR','It emits more CO₂'],
        ans: 1
      },
      {
        q: 'When sunlight is ABSORBED by a surface, the energy becomes:',
        opts: ['Reflected yellow light','Heat (infrared radiation)','CO₂ molecules','More sunlight'],
        ans: 1
      },
      {
        q: 'Which surface in this simulation had the LOWEST albedo and heated fastest?',
        opts: ['Snow','Ash & Snow','Bare Earth','All the same'],
        ans: 2
      },
      {
        q: 'Snow has high albedo. If snow melts and exposes dark earth, what happens?',
        opts: ['More light is reflected','Less heat is absorbed','More heat is absorbed','Albedo increases'],
        ans: 2
      }
    ];
    let albQuizIdx     = 0;
    let albQuizSel     = 0;
    let albQuizAnswers = [];
    let albQuizDone    = false;
    let albAllCorrect  = false;
    let albedoStarDone = false;
    let albSunRays  = [];
    let albIRArrows = [];
    let albRefArrows= [];
    let albLastTime = 0;
    let albedoDone  = false;

    function initAlbedoSim() {
      albSel = 0;
      albExplored  = [false,false,false];
      albSurfTemp  = [0,0,0];
      albTaskPhase = 0;
      albSunRays   = []; albIRArrows = []; albRefArrows = [];
      albLastTime  = 0; albedoDone = false; albTaskPhase = 0;
      albQuizIdx=0; albQuizSel=0; albQuizAnswers=[]; albQuizDone=false; albAllCorrect=false;
      for (let i=0;i<10;i++) spawnAlbSun(Math.random());
    }

    function spawnAlbSun(prog) {
      const CW=albedoCanvas.width, CH=albedoCanvas.height;
      albSunRays.push({
        x: Math.random()*CW,
        y: prog * CH * 0.55,
        vy: 1.8 + Math.random()*1.0,
        len: 16 + Math.random()*8,
        alpha: 0.8 + Math.random()*0.2,
      });
    }
    function spawnAlbIR(x, surfY) {
      albIRArrows.push({ x, y: surfY, vy: -(1.5+Math.random()*0.8), alpha:0.9 });
    }
    function spawnAlbRef(x, surfY) {
      albRefArrows.push({ x, y: surfY, vy: -(1.8+Math.random()*1.0), alpha:0.85 });
    }

    const albedoCanvas = document.getElementById('albedocanvas');
    const albCtx       = albedoCanvas.getContext('2d');

    function drawAlbedoCanvas(ts) {
      if (!albLastTime) albLastTime = ts;
      const dt = Math.min((ts - albLastTime)/1000, 0.05);
      albLastTime = ts;

      const CW = albedoCanvas.width, CH = albedoCanvas.height;
      const surf = ALBEDO_SURFACES[albSel];

      // Update surface temp
      albSurfTemp[albSel] = Math.min(60, albSurfTemp[albSel] + surf.heatRate * dt);
      albExplored[albSel] = true;

      // Spawn sun rays — every 3rd frame to reduce density
      if (Math.floor(ts / 16) % 3 === 0) {
        albSunRays.push({ x:Math.random()*CW, y:0, vy:1.8+Math.random()*1.0, len:16+Math.random()*8, alpha:0.9 });
      }

      // Surface geometry
      const surfW  = CW;
      const surfH  = CH * 0.18;
      const surfX  = 0;
      const surfY  = CH * 0.62;

      // ── Sky ──────────────────────────────────────────────────────
      const skyGrad = albCtx.createLinearGradient(0,0,0,surfY);
      skyGrad.addColorStop(0,'#000020');
      skyGrad.addColorStop(1,'#001040');
      albCtx.fillStyle = skyGrad;
      albCtx.fillRect(0,0,CW,CH);

      // ── Sun ──────────────────────────────────────────────────────
      const sunX=CW*0.50, sunY=CH*0.10, sunR=Math.min(CW,CH)*0.055;
      const sg = albCtx.createRadialGradient(sunX,sunY,0,sunX,sunY,sunR*2.5);
      sg.addColorStop(0,'rgba(255,255,80,0.95)'); sg.addColorStop(1,'rgba(255,200,0,0)');
      albCtx.fillStyle=sg; albCtx.beginPath(); albCtx.arc(sunX,sunY,sunR*2.5,0,Math.PI*2); albCtx.fill();
      albCtx.fillStyle=PAL[14]; albCtx.beginPath(); albCtx.arc(sunX,sunY,sunR,0,Math.PI*2); albCtx.fill();

      // ── Surface ──────────────────────────────────────────────────
      // Surface fill
      const sGrad = albCtx.createLinearGradient(0,surfY,0,surfY+surfH);
      sGrad.addColorStop(0, surf.color);
      sGrad.addColorStop(1, surf.dark);
      albCtx.fillStyle = sGrad;
      albCtx.fillRect(surfX, surfY, surfW, surfH);


      // Surface texture details
      if (albSel===0) { // snow: small bumps
        albCtx.fillStyle='rgba(255,255,255,0.25)';
        for(let i=0;i<8;i++){const bx=surfX+surfW*0.05+i*surfW*0.12,by=surfY+surfH*0.3;albCtx.beginPath();albCtx.ellipse(bx,by,surfW*0.04,surfH*0.15,0,0,Math.PI*2);albCtx.fill();}
      } else if (albSel===1) { // ash: grey blotches over white
        albCtx.fillStyle='rgba(60,60,50,0.5)';
        for(let i=0;i<6;i++){albCtx.beginPath();albCtx.ellipse(surfX+surfW*(0.1+i*0.16),surfY+surfH*0.4,surfW*0.06,surfH*0.25,0,0,Math.PI*2);albCtx.fill();}
      } else if (albSel===2) { // earth: rough lines
        albCtx.strokeStyle='rgba(0,0,0,0.3)'; albCtx.lineWidth=2;
        for(let i=0;i<5;i++){albCtx.beginPath();albCtx.moveTo(surfX,surfY+surfH*(0.2+i*0.18));albCtx.lineTo(surfX+surfW,surfY+surfH*(0.2+i*0.18)+8);albCtx.stroke();}
      }

      // Below-surface ground
      albCtx.fillStyle='#1A0A00';
      albCtx.fillRect(0,surfY+surfH,CW,CH-(surfY+surfH));

      // ── Sun rays (yellow ↓) ──────────────────────────────────────
      albSunRays.forEach(r => {
        r.y += r.vy;
        if (r.y >= surfY) {
          // Hit surface — split into reflected and absorbed
          const reflect = Math.random() < surf.albedo;
          if (reflect) spawnAlbRef(r.x, surfY);
          else         spawnAlbIR(r.x, surfY);
          r.dead = true; return;
        }
        albCtx.strokeStyle = `rgba(255,230,0,${r.alpha*0.8})`;
        albCtx.lineWidth = 1.5;
        albCtx.beginPath(); albCtx.moveTo(r.x,r.y-r.len/2); albCtx.lineTo(r.x,r.y+r.len/2); albCtx.stroke();
        albCtx.beginPath(); albCtx.moveTo(r.x-4,r.y+r.len/2-6); albCtx.lineTo(r.x,r.y+r.len/2); albCtx.lineTo(r.x+4,r.y+r.len/2-6); albCtx.stroke();
      });
      albSunRays = albSunRays.filter(r=>!r.dead);

      // ── Reflected rays (yellow ↑, bounce back up) ────────────────
      albRefArrows.forEach(r => {
        r.y += r.vy; r.alpha -= 0.008;
        if (r.y < 0 || r.alpha<=0) { r.dead=true; return; }
        albCtx.strokeStyle = `rgba(255,230,0,${r.alpha*0.7})`;
        albCtx.lineWidth = 1.5;
        albCtx.beginPath(); albCtx.moveTo(r.x,r.y+12); albCtx.lineTo(r.x,r.y); albCtx.stroke();
        albCtx.beginPath(); albCtx.moveTo(r.x-4,r.y+6); albCtx.lineTo(r.x,r.y); albCtx.lineTo(r.x+4,r.y+6); albCtx.stroke();
      });
      albRefArrows = albRefArrows.filter(r=>!r.dead);

      // ── IR (absorbed, become red ↑) ──────────────────────────────
      albIRArrows.forEach(r => {
        r.y += r.vy; r.alpha -= 0.006;
        if (r.y < 0 || r.alpha<=0) { r.dead=true; return; }
        albCtx.strokeStyle = `rgba(255,80,80,${r.alpha})`;
        albCtx.lineWidth = 1.5;
        albCtx.beginPath(); albCtx.moveTo(r.x,r.y+12); albCtx.lineTo(r.x,r.y); albCtx.stroke();
        albCtx.beginPath(); albCtx.moveTo(r.x-4,r.y+6); albCtx.lineTo(r.x,r.y); albCtx.lineTo(r.x+4,r.y+6); albCtx.stroke();
      });
      albIRArrows = albIRArrows.filter(r=>!r.dead);

      // ── HUD ──────────────────────────────────────────────────────
      const hudSz = Math.floor(CH*0.038);
      albCtx.font=`bold ${hudSz}px 'VT323',monospace`;
      albCtx.textAlign='left'; albCtx.fillStyle=PAL[14];
      albCtx.fillText('ALBEDO SIMULATION', CW*0.02, CH*0.05);

      albCtx.font=`${Math.floor(CH*0.030)}px 'VT323',monospace`;
      albCtx.fillStyle=PAL[11];
      albCtx.fillText('Surface: ' + surf.name, CW*0.02, CH*0.10);
      albCtx.fillText('Albedo:  ' + Math.round(surf.albedo*100) + '% reflected', CW*0.02, CH*0.145);

      // Surface temp readout
      const st = albSurfTemp[albSel];
      const tempCol = st > 40 ? PAL[12] : st > 20 ? PAL[14] : PAL[11];
      albCtx.font=`bold ${Math.floor(CH*0.034)}px 'VT323',monospace`;
      albCtx.fillStyle=tempCol; albCtx.textAlign='right';
      albCtx.fillText('Surface Temp: +' + st.toFixed(1) + '°C', CW*0.98, CH*0.10);

      // Temp bar
      const tbx=CW*0.55, tby=CH*0.125, tbw=CW*0.43, tbh=CH*0.018;
      albCtx.strokeStyle=PAL[8]; albCtx.lineWidth=1; albCtx.strokeRect(tbx,tby,tbw,tbh);
      albCtx.fillStyle=st>40?PAL[12]:st>20?PAL[14]:PAL[10];
      albCtx.fillRect(tbx,tby,tbw*(st/60),tbh);

      // Albedo visual bar
      albCtx.font=`${Math.floor(CH*0.026)}px 'VT323',monospace`;
      albCtx.fillStyle=PAL[7]; albCtx.textAlign='right';
      albCtx.fillText('↑ reflected', CW*0.98, CH*0.175);
      const abx=CW*0.55, aby=CH*0.188, abw=CW*0.43, abh=CH*0.015;
      albCtx.strokeStyle=PAL[8]; albCtx.lineWidth=1; albCtx.strokeRect(abx,aby,abw,abh);
      albCtx.fillStyle=PAL[14];
      albCtx.fillRect(abx,aby,abw*surf.albedo,abh);

      // Surface selector tabs at bottom (3 surfaces, evenly spaced)
      const tabW=CW*0.28, tabH=CH*0.065, tabY=CH*0.91;
      ALBEDO_SURFACES.forEach((s,i)=>{
        const tx=CW*(0.04+i*0.32);
        const isSel=i===albSel;
        const isDone=albExplored[i];
        albCtx.fillStyle=isSel?'rgba(80,60,0,0.7)':isDone?'rgba(0,40,0,0.4)':'rgba(10,10,20,0.6)';
        albCtx.fillRect(tx,tabY,tabW,tabH);
        albCtx.strokeStyle=isSel?PAL[14]:isDone?PAL[10]:PAL[8];
        albCtx.lineWidth=isSel?2:1;
        albCtx.strokeRect(tx,tabY,tabW,tabH);
        albCtx.font=`bold ${Math.floor(CH*0.028)}px 'VT323',monospace`;
        albCtx.fillStyle=isSel?PAL[14]:isDone?PAL[10]:PAL[7];
        albCtx.textAlign='center';
        albCtx.fillText((isSel?'▶ ':isDone?'✓ ':'')+s.name, tx+tabW/2, tabY+tabH*0.62);
      });

      // Exploration progress
      const explored=albExplored.filter(Boolean).length;
      const allExplored = explored === 3;
      // Advance task phase
      if (allExplored && albTaskPhase===0) albTaskPhase=1;
      if (albTaskPhase===1 && albSurfTemp[albSel]>=30) albTaskPhase=2;

      // ── Task row (between controls hint and tabs) ─────────────────
      if (albTaskPhase >= 1) {
        const taskTarget = 30;
        const taskDone   = albTaskPhase === 2;
        const taskSurf   = albSurfTemp[albSel];
        const taskProg   = Math.min(1, taskSurf / taskTarget);
        const rowY  = tabY - CH*0.075;
        const rowH  = CH*0.058;
        albCtx.fillStyle = 'rgba(0,0,0,0.55)';
        albCtx.fillRect(CW*0.02, rowY, CW*0.96, rowH);
        albCtx.strokeStyle = taskDone ? PAL[10] : PAL[14]; albCtx.lineWidth=1;
        albCtx.strokeRect(CW*0.02, rowY, CW*0.96, rowH);
        albCtx.font=`bold ${Math.floor(CH*0.028)}px 'VT323',monospace`;
        albCtx.fillStyle = taskDone ? PAL[10] : PAL[14]; albCtx.textAlign='left';
        const taskLabel = taskDone
          ? '✓  TASK COMPLETE!  [ ENTER ] to continue to quiz'
          : 'TASK: Raise surface temperature to +30°C  (select a surface and observe)';
        albCtx.fillText(taskLabel, CW*0.04, rowY + rowH*0.45);
        if (!taskDone) {
          const bx=CW*0.04, by=rowY+rowH*0.62, bw=CW*0.92, bh=rowH*0.28;
          albCtx.strokeStyle=PAL[8]; albCtx.lineWidth=1; albCtx.strokeRect(bx,by,bw,bh);
          albCtx.fillStyle=taskProg>0.8?PAL[12]:taskProg>0.4?PAL[14]:PAL[10];
          albCtx.fillRect(bx,by,bw*taskProg,bh);
          albCtx.font=`${Math.floor(CH*0.022)}px 'VT323',monospace`;
          albCtx.fillStyle=PAL[7]; albCtx.textAlign='right';
          albCtx.fillText(taskSurf.toFixed(1)+'°C / 30°C', CW*0.96, rowY+rowH*0.52);
        }
      }

      albCtx.font=`${Math.floor(CH*0.026)}px 'VT323',monospace`;
      albCtx.fillStyle=PAL[7]; albCtx.textAlign='center';
      albCtx.fillText('Explored: '+explored+' / 3     ◄ ► switch surface     ESC menu', CW/2, CH*0.985);

      // Legend
      albCtx.textAlign='left'; albCtx.font=`${Math.floor(CH*0.025)}px 'VT323',monospace`;
      albCtx.fillStyle=PAL[14]; albCtx.fillText('↓ solar', CW*0.02, CH*0.22);
      albCtx.fillStyle=PAL[14]; albCtx.fillText('↑ reflected', CW*0.12, CH*0.22);
      albCtx.fillStyle=PAL[12]; albCtx.fillText('↑ IR/heat absorbed', CW*0.26, CH*0.22);

      // ── Quiz overlay (albTaskPhase === 2) ───────────────────────
      if (albTaskPhase === 2) {
        const Q = ALB_QUESTIONS[albQuizIdx];
        albCtx.fillStyle='rgba(0,0,0,0.88)';
        albCtx.fillRect(0,0,CW,CH);

        albCtx.font=`bold ${Math.floor(CH*0.042)}px 'VT323',monospace`;
        albCtx.fillStyle=PAL[14]; albCtx.textAlign='center';
        albCtx.fillText('QUESTION '+(albQuizIdx+1)+' of '+ALB_QUESTIONS.length, CW/2, CH*0.14);

        // Word-wrap question
        const words=Q.q.split(' '); let line='',qLines=[],maxW=CW*0.78;
        albCtx.font=`${Math.floor(CH*0.038)}px 'VT323',monospace`;
        for(const w of words){const t=line?line+' '+w:w;if(albCtx.measureText(t).width>maxW&&line){qLines.push(line);line=w;}else line=t;}
        if(line)qLines.push(line);
        albCtx.fillStyle=PAL[15];

    // ── Init helpers ─────────────────────────────────────────────────
    function initGlaciersTask() {
      temperature=0; taskComplete=false; taskNum=1;
      taskDirection=['raise','lower'][Math.floor(Math.random()*2)];
      taskAmount=[2,4,6,8][Math.floor(Math.random()*4)];
      targetSeaLevel=taskDirection==='raise'?taskAmount:-taskAmount;
    }
    function startTask2() {
      temperature=0; taskComplete=false; taskNum=2;
      taskDirection=taskDirection==='raise'?'lower':'raise';
      targetSeaLevel=taskDirection==='raise'?taskAmount:-taskAmount;
    }
    function initGlaciersGraph() {
      graphScenario=Math.random()<0.5?'growing':'shrinking';
      slopeFactor=0.8+Math.random()*0.4; noiseMag=0.5+Math.random()*1.0;
      const RANGE=7;
      for (let x=0;x<60;x++) {
        const gb=10-Math.round(slopeFactor*RANGE*x/59);
        const sb=3+Math.round(slopeFactor*RANGE*x/59);
        graphPointsGrowing[x]  =Math.max(3,Math.min(10,gb+Math.round((Math.random()-.5)*2*noiseMag)));
        graphPointsShrinking[x]=Math.max(3,Math.min(10,sb+Math.round((Math.random()-.5)*2*noiseMag)));
      }
      graphQ1=0; graphQ2=0; graphStep=0;
    }
    function initCO2Task() { co2Task=1; }

    // ── Text helpers ─────────────────────────────────────────────────
    function putText(G,row,col,text,color,blink) {
      blink=blink||false;
      [...text].forEach((ch,j)=>{
        const c=col+j;
        if(row>=1&&row<=H-2&&c>=1&&c<=W-2) G[row][c]=[ch,color,blink];
      });
    }
    function putCentered(G,row,text,color,blink) {
      putText(G,row,1+Math.round(((W-2)-text.length)/2),text,color,blink);
    }

    // ── Keydown ──────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (['ArrowLeft','ArrowRight','Enter','Escape'].includes(e.key)) e.preventDefault();
      // ── Name entry state ─────────────────────────────────────────
      if (state === 'name-entry') {
        if (e.key === 'Enter' && nameEntry.trim().length > 0) {
          studentName = nameEntry.trim();
          state = 'menu';
        } else if (e.key === 'Backspace') {
          nameEntry = nameEntry.slice(0, -1);
        } else if (e.key.length === 1 && nameEntry.length < 24) {
          nameEntry += e.key;
        }
        return;
      }
      if (state==='loading'&&e.key==='Enter') { state='menu'; selected=0; }
      else if (state==='menu') {
        // If all stars earned and no name yet, prompt name on any Enter
        const allStars = glacierTaskComplete && co2TaskDone && albedoStarDone;
        if (allStars && !studentName && e.key==='Enter') { nameEntry=''; state='name-entry'; return; }
        if (e.key==='ArrowLeft')  selected=(selected+2)%3;
        if (e.key==='ArrowRight') selected=(selected+1)%3;
        if (e.key==='Enter'&&selected===0) { initGlaciersTask(); state='glaciers-intro'; }
        if (e.key==='Enter'&&selected===1) { initCO2Task(); state='co2-intro'; }
        if (e.key==='Enter'&&selected===2) { state='albedo-intro'; }
      } else if (state==='glaciers-intro') {
        if (e.key==='Enter') state='glaciers-sim';
        if (e.key==='Escape') state='menu';
      } else if (state==='co2-intro') {
        if (e.key==='Enter') { initCO2Sim(); state='co2-sim'; }
        if (e.key==='Escape') state='menu';
      } else if (state==='co2-sim') {
        if (co2TaskPhase === 2) {
          // Quiz mode
          if (!co2QuizDone) {
            if (e.key==='ArrowLeft')  co2QuizSel=(co2QuizSel+3)%4;
            if (e.key==='ArrowRight') co2QuizSel=(co2QuizSel+1)%4;
            if (e.key==='ArrowUp')    co2QuizSel=(co2QuizSel+3)%4;
            if (e.key==='ArrowDown')  co2QuizSel=(co2QuizSel+1)%4;
            if (e.key==='Enter') {
              co2QuizAnswers.push(co2QuizSel);
              if (co2QuizIdx < CO2_QUESTIONS.length-1) {
                co2QuizIdx++; co2QuizSel=0;
              } else {
                // All answered — check
                co2QuizDone = true;
                co2AllCorrect = CO2_QUESTIONS.every((q,i)=>co2QuizAnswers[i]===q.ans);
                co2TaskPhase = 3;
                if (co2AllCorrect) co2TaskDone = true;
              }
            }
          } else {
            if (e.key==='Enter') state='menu';
          }
        } else if (co2TaskPhase === 3) {
          if (e.key==='Enter') state='menu';
        } else {
          // Sim mode
          if (e.key==='ArrowLeft')  co2Sel=(co2Sel+2)%3;
          if (e.key==='ArrowRight') co2Sel=(co2Sel+1)%3;
          if (e.key==='Enter') co2Active[co2Sel]=!co2Active[co2Sel];
        }
        if (e.key==='Escape') { state='menu'; }
      } else if (state==='albedo-intro') {
        if (e.key==='Enter') { initAlbedoSim(); state='albedo-sim'; }
        if (e.key==='Escape') state='menu';
      } else if (state==='albedo-sim') {
        if (albTaskPhase === 2) {
          // Quiz
          if (e.key==='ArrowLeft'||e.key==='ArrowUp')   albQuizSel=(albQuizSel+3)%4;
          if (e.key==='ArrowRight'||e.key==='ArrowDown') albQuizSel=(albQuizSel+1)%4;
          if (e.key==='Enter') {
            albQuizAnswers.push(albQuizSel);
            if (albQuizIdx < ALB_QUESTIONS.length-1) {
              albQuizIdx++; albQuizSel=0;
            } else {
              albQuizDone=true;
              albAllCorrect=ALB_QUESTIONS.every((q,i)=>albQuizAnswers[i]===q.ans);
              albTaskPhase=3;
              if (albAllCorrect) albedoStarDone=true;
            }
          }
        } else if (albTaskPhase === 3) {
          if (e.key==='Enter') state='menu';
        } else {
          // Explore / task sim
          if (e.key==='ArrowLeft')  albSel=(albSel+2)%3;
          if (e.key==='ArrowRight') albSel=(albSel+1)%3;
          if (e.key==='Enter' && albTaskPhase===2) albTaskPhase=2; // trigger quiz
          if (e.key==='Enter' && albTaskPhase===1 && albSurfTemp[albSel]>=30) albTaskPhase=2;
        }
        if (e.key==='Escape') state='menu';
      } else if (state==='glaciers-sim') {
        if (e.key==='ArrowLeft')  temperature=Math.max(-20,temperature-1);
        if (e.key==='ArrowRight') temperature=Math.min(20,temperature+1);
        if (e.key==='Escape') state='menu';
        if (e.key==='Enter'&&taskComplete) {
          if (taskNum===1) { startTask2(); state='glaciers-intro'; }
          else             { initGlaciersGraph(); state='glaciers-graph'; }
        }
      } else if (state==='glaciers-graph') {
        if (e.key==='ArrowLeft'||e.key==='ArrowRight') {
          if (graphStep===0) graphQ1^=1;
          if (graphStep===1) graphQ2^=1;
        }
        if (e.key==='Enter') {
          if (graphStep<2) {
            graphStep++;
          } else {
            const cQ1=graphScenario==='growing'?1:0, cQ2=graphScenario==='growing'?1:0;
            const glacierCorrect=(graphQ1===cQ1&&graphQ2===cQ2);
            if (glacierCorrect) glacierTaskComplete=true;
            state='menu';
          }
        }
        if (e.key==='Escape') state='menu';
      }
    });

    // ── Border path ──────────────────────────────────────────────────
    const BORDER=(()=>{
      const p=[];
      for(let c=0;c<W;c++) p.push([0,c]);
      for(let r=1;r<H-1;r++) p.push([r,W-1]);
      for(let c=W-1;c>=0;c--) p.push([H-1,c]);
      for(let r=H-2;r>=1;r--) p.push([r,0]);
      return p;
    })();

    // ================================================================
    // Text-mode draw functions
    // ================================================================
    function drawBox(G,sr,sc,lines,highlighted) {
      const col=highlighted?10:15, iW=BOX_W-2, iH=BOX_H-2;
      G[sr][sc]=['╔',col,false];
      for(let c=1;c<BOX_W-1;c++) G[sr][sc+c]=['═',col,false];
      G[sr][sc+BOX_W-1]=['╗',col,false];
      for(let r=1;r<=iH;r++) { G[sr+r][sc]=['║',col,false]; G[sr+r][sc+BOX_W-1]=['║',col,false]; }
      G[sr+BOX_H-1][sc]=['╚',col,false];
      for(let c=1;c<BOX_W-1;c++) G[sr+BOX_H-1][sc+c]=['═',col,false];
      G[sr+BOX_H-1][sc+BOX_W-1]=['╝',col,false];
      const vOff=Math.floor((iH-lines.length)/2);
      lines.forEach((line,li)=>{
        const r=sr+1+vOff+li, hOff=Math.round((iW-line.length)/2);
        [...line].forEach((ch,j)=>{ const gc=sc+1+hOff+j; if(gc>sc&&gc<sc+BOX_W-1) G[r][gc]=[ch,col,false]; });
      });
    }

    function drawLoading(G) {
      const innerW=W-2, startRow=Math.round((H-LINES.length)/2);
      LINES.forEach(({t,c,b=false},i)=>{
        const r=startRow+i; if(r<1||r>=H-1) return;
        const startC=1+Math.round((innerW-t.length)/2);
        [...t].forEach((ch,j)=>{ const gc=startC+j; if(gc>=1&&gc<=W-2) G[r][gc]=[ch,c,b]; });
      });
    }


    function drawNameEntry(G) {
      putCentered(G, 2, '★  A L L   T A S K S   C O M P L E T E !  ★', 14);
      putCentered(G, 4, 'You earned all three stars!', 10);
      putCentered(G, 6, 'Enter your name for the record:', 15);
      // Input box
      const cursor = tick % 8 < 4 ? '█' : ' ';

    function drawMenu(G) {
      const allStars = glacierTaskComplete && co2TaskDone && albedoStarDone;

      // ── Celebration banner ──────────────────────────────────────
      if (studentName) {
        const msg = studentName + ' did their work for Monday!';

      if (albedoStarDone)      putText(G,BOX_ROW+BOX_H,BOX_COLS[2]+Math.floor(BOX_W/2)-1,'★',14);
      const hint='◄ ►  to select   ENTER to launch', hintRow=BOX_ROW+BOX_H+2;
      if (hintRow<H-1) {
        const hs=1+Math.round(((W-2)-hint.length)/2);

    function drawGlaciersIntro(G) {
      putCentered(G,2,'G L A C I E R S   A N D   S E A - L E V E L',14);
      putCentered(G,4,'Continental glaciers are massive ice sheets on land.',15);
      putCentered(G,5,'When temperatures rise, glaciers melt — sea levels rise.',11);

      putCentered(G,8,SEP,8);
      putCentered(G,10,'T A S K   '+taskNum+'   O F   2 :',14);
      const dirWord=taskDirection==='raise'?'Raise':'Lower';
      putCentered(G,11,dirWord+' the sea-level by '+taskAmount+'.0m',taskDirection==='raise'?10:12);

    }

    function drawGlaciersSim(G) {
      const seaLevel=temperature*0.5;
      if(!taskComplete&&Math.abs(seaLevel-targetSeaLevel)<0.3) taskComplete=true;
      const tempStr=(temperature>0?'+':'')+temperature+'°C';
      const slvlStr=(seaLevel>0?'+':'')+seaLevel.toFixed(1)+'m';
      const tempColor=temperature<0?9:temperature>0?12:15;
      const slvlColor=seaLevel<0?9:seaLevel>0?12:15;
      putText(G,1,3,'GLACIERS & SEA-LEVEL',14);
      putText(G,1,26,'TEMP:',8); putText(G,1,32,tempStr.padEnd(5),tempColor);
      putText(G,1,42,'SEA LEVEL:',8); putText(G,1,53,slvlStr.padEnd(6),slvlColor);
      const glacierFraction=Math.max(0,(20-temperature)/40);
      const halfWidth=Math.round(12*glacierFraction);
      const domeHeight=Math.round(9*glacierFraction);
      const seaLvlRow=Math.round(7-3*temperature/20);
      const LCTR=15,SR=2;
      for(let sc=0;sc<32;sc++){
        const gc=sc+1, dist=Math.abs(sc-LCTR);
        const dtop=(halfWidth===0||dist>=halfWidth)?12:Math.max(1,12-Math.round(domeHeight*(1-(dist/halfWidth)**2)));
        for(let sr=0;sr<13;sr++){
          const gr=sr+SR;
          if(sr===12) G[gr][gc]=['▓',6,false];
          else if(sr>=dtop&&sr<=11){const d=sr-dtop;G[gr][gc]=[d===0?'░':d<=2?'▒':'▓',d===0?15:d<=2?11:3,false];}
          else G[gr][gc]=temperature<=0&&(sr*7+sc*3+tick)%11===0?['.',15,false]:[' ',0,false];
        }
      }
      const lc=seaLevel>0?12:seaLevel<0?9:15;
      for(let sc=32;sc<=35;sc++){
        const gc=sc+1;
        for(let sr=0;sr<13;sr++){
          const gr=sr+SR;
          G[gr][gc]=sc===35?['│',8,false]:sr===seaLvlRow?['─',lc,false]:[' ',0,false];
        }
      }
      if(seaLvlRow>0){const lblRow=seaLvlRow+SR-1;if(lblRow>=2&&lblRow<=14)putText(G,lblRow,33,(seaLevel>=0?'+':'')+seaLevel.toFixed(1)+'m',lc);}
      for(let sc=36;sc<68;sc++){
        const gc=sc+1;
        for(let sr=0;sr<13;sr++){
          const gr=sr+SR;
          if(sr===12) G[gr][gc]=['▓',8,false];
          else if(sr===seaLvlRow) G[gr][gc]=[tick%2===0?'≈':'~',11,false];
          else if(sr>seaLvlRow&&sr<=seaLvlRow+2) G[gr][gc]=['░',9,false];
          else if(sr>seaLvlRow+2&&sr<12) G[gr][gc]=['▓',1,false];
          else G[gr][gc]=[' ',0,false];
        }
      }
      if(temperature>0){putText(G,2,54,' \\ | / ',14);putText(G,3,54,' (^_^) ',14);putText(G,4,54,' / | \\',14);}
      const sp=Math.round((temperature+20)/40*28), bar='█'.repeat(sp)+'░'.repeat(28-sp);
      putCentered(G,17,'TEMP: ◄ ['+bar+'] ► '+tempStr,temperature<0?9:temperature>0?12:15);
      if(taskComplete) {
        putCentered(G,18,'✓ TASK COMPLETE!  Reached '+(seaLevel>=0?'+':'')+seaLevel.toFixed(1)+'m   [ ENTER to continue ]',10);
      } else {
        const prog=targetSeaLevel!==0?Math.min(1,Math.max(0,seaLevel/targetSeaLevel)):0;
        const pBar='['+'▓'.repeat(Math.floor(prog*10))+'░'.repeat(10-Math.floor(prog*10))+']';
        putCentered(G,18,(taskDirection==='raise'?'Raise':'Lower')+' to '+(targetSeaLevel>=0?'+':'')+targetSeaLevel.toFixed(1)+'m   Now: '+(seaLevel>=0?'+':'')+seaLevel.toFixed(1)+'m   '+pBar+' '+Math.round(prog*100)+'%',15);
      }
      putCentered(G,19,'◄ ► adjust temperature     ESC: menu',7);
    }

      putCentered(G,14,q1,graphStep===0?15:8);
      const q2=(graphScenario==='shrinking'?'As ice volume decreases, ':'As ice volume increases, ')+'temperature is: '+(graphQ2===0?'[ WARMER ]':'  WARMER  ')+'  '+(graphQ2===1?'[ COOLER ]':'  COOLER  ');
      putCentered(G,15,q2,graphStep>=1?15:8);
      if(graphStep<2){
        putCentered(G,17,'◄ ► to choose   ENTER to confirm',7);
      } else {

        if(graphQ1===cQ1&&graphQ2===cQ2) { putCentered(G,17,'✓  CORRECT!  ★ Star earned!  [ ENTER ] to menu',10); }
        else { const a1=cQ1===0?'RISING':'FALLING',a2=cQ2===0?'WARMER':'COOLER'; putCentered(G,17,'✗  Wrong. ('+a1+'/'+a2+')  Redo activity for star.  [ ENTER ]',12); }
      }
      putCentered(G,18,'ESC: return to menu',7);
    }

    function drawCO2Intro(G) {
      putCentered(G,2,'C O₂   G R E E N H O U S E   E F F E C T',14);
      putCentered(G,4,'Carbon dioxide and other greenhouse gases trap heat.',15);
      putCentered(G,5,'More CO₂ = more heat trapped = warmer planet.',11);
      putCentered(G,8,SEP,8);
      putCentered(G,10,'T A S K   '+co2Task+'   O F   1 :',14);
      putCentered(G,11,'Toggle CO₂ sources and observe how they affect the atmosphere.',15);
      putCentered(G,15,'[ ENTER ] to start     [ ESC ] to menu',8,true);
    }


    function drawAlbedoIntro(G) {
      putCentered(G,2,'A L B E D O',14);
      putCentered(G,4,'Albedo is the fraction of sunlight a surface reflects.',15);
      putCentered(G,5,'High albedo = more reflected = cooler surface.',11);
      putCentered(G,6,'Low albedo  = more absorbed  = warmer surface.',12);
      putCentered(G,8,SEP,8);
      putCentered(G,10,'You will explore four surfaces:',15);
      putCentered(G,11,'Snow  ·  Ash-covered snow  ·  Bare earth',11);
      putCentered(G,13,'Watch how solar arrows are reflected (yellow) or',8);
      putCentered(G,14,'absorbed and re-emitted as heat (red).',8);
      putCentered(G,16,'Use ◄ ► to switch surfaces and observe each one.',7);
      putCentered(G,18,'[ ENTER ] to begin     [ ESC ] to menu',8,true);
    }

    // ================================================================
    // CO2 Canvas Simulation
    // ================================================================
    const canvas = document.getElementById('co2canvas');
    const ctx    = canvas.getContext('2d');

    // Zones (fractions of canvas height)
    // sky: 0 → atmTop, atm band: atmTop→atmBot, scene: atmBot→groundTop, ground: groundTop→1
    const ATM_TOP    = 0.28;   // atmosphere band top  (raised — more sky above)
    const ATM_BOT    = 0.42;   // atmosphere band bottom / scene top
    const GROUND_TOP = 0.78;   // top of ground strip

    // Region x-centers (fractions of canvas width)
    const REGION_X = [0.15, 0.50, 0.82];
    const REGION_LABELS = ['FOREST', 'VOLCANO', 'CITY'];
    const REGION_COLORS = [PAL[10], PAL[12], PAL[7]];
    const REGION_RATES  = ['absorbs CO₂', 'emits CO₂', 'emits CO₂ (most)'];

    function spawnCO2(progress) {
      const W=canvas.width, H=canvas.height;
      const srcIdx = Math.floor(Math.random()*3);
      const x = (REGION_X[srcIdx] + (Math.random()-0.5)*0.08) * W;
      const yStart = ATM_BOT * H;
      const yTop   = ATM_TOP * H;          // ceiling — never go above this
      co2Particles.push({
        x, y: yStart - progress*(yStart - yTop),
        vx: (Math.random()-0.5)*0.4,
        vy: -(0.5 + Math.random()*0.4),
        alpha: 0.7 + Math.random()*0.3,
        r: 3 + Math.random()*3,
      });
    }

    function spawnSunRay(progress) {
      const W=canvas.width, H=canvas.height;
      const x = (0.1 + Math.random()*0.8)*W;
      sunRays.push({
        x,
        y: progress * ATM_TOP * H,
        vy: 1.2 + Math.random()*0.8,
        len: 14 + Math.random()*10,
        alpha: 0.7 + Math.random()*0.3,
      });
    }

    function spawnIR(progress) {
      const W=canvas.width, H=canvas.height;
      const x = (0.05 + Math.random()*0.9)*W;
      const yStart = GROUND_TOP * H;
      irArrows.push({
        x,
        y: yStart - progress*(GROUND_TOP - ATM_TOP)*H,
        vy: -(1.0 + Math.random()*0.6),
        alpha: 0.8,
        reflected: false,
        life: progress
      });
    }

    let co2LastTime = 0;
    let co2SpawnAcc = 0;
    let irSpawnAcc  = 0;
    let sunSpawnAcc = 0;

    function drawCO2Canvas(ts) {
      if (!co2LastTime) co2LastTime = ts;
      const dt = Math.min((ts - co2LastTime)/1000, 0.05); // seconds, capped
      co2LastTime = ts;

      const CW = canvas.width, CH = canvas.height;

      // ── Update PPM/Temp ──────────────────────────────────────────
      for (let i=0; i<3; i++) {
        if (co2Active[i]) {
          co2Ppm  = Math.min(800, Math.max(280, co2Ppm  + CO2_RATES[i]  * dt));
          co2Temp = Math.min(6,   Math.max(-2,  co2Temp + TEMP_RATES[i] * dt));
        }
      }

      // ── Spawn particles ──────────────────────────────────────────
      // CO2 molecules: rate scales with active sources
      let co2EmitRate = 0;
      for (let i=0; i<3; i++) if (co2Active[i]) co2EmitRate += (i===0?2:i===1?4:7);
      co2EmitRate += 1; // always some background
      co2SpawnAcc += co2EmitRate * dt;
      while (co2SpawnAcc >= 1) { spawnCO2(0); co2SpawnAcc--; }

      // Sun rays: constant
      sunSpawnAcc += 3 * dt;
      while (sunSpawnAcc >= 1) { spawnSunRay(0); sunSpawnAcc--; }

      // IR arrows: more when PPM is high
      const irRate = 1 + (co2Ppm - 280) / 100;
      irSpawnAcc += irRate * dt;
      while (irSpawnAcc >= 1) { spawnIR(0); irSpawnAcc--; }

      // ── Clear ────────────────────────────────────────────────────
      ctx.fillStyle = '#000010';
      ctx.fillRect(0, 0, CW, CH);

      // ── Sky gradient ─────────────────────────────────────────────
      const skyGrad = ctx.createLinearGradient(0,0,0,ATM_TOP*CH);
      skyGrad.addColorStop(0,'#000033');
      skyGrad.addColorStop(1,'#001144');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, CW, ATM_TOP*CH);

      // ── Sun ──────────────────────────────────────────────────────
      const sunX = CW*0.88, sunY = CH*0.08, sunR = Math.min(CW,CH)*0.045;
      const sunGlow = ctx.createRadialGradient(sunX,sunY,0,sunX,sunY,sunR*2.5);
      sunGlow.addColorStop(0, 'rgba(255,255,80,0.9)');
      sunGlow.addColorStop(0.4,'rgba(255,200,0,0.4)');
      sunGlow.addColorStop(1,'rgba(255,200,0,0)');
      ctx.fillStyle = sunGlow;
      ctx.beginPath(); ctx.arc(sunX, sunY, sunR*2.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = PAL[14];
      ctx.beginPath(); ctx.arc(sunX, sunY, sunR, 0, Math.PI*2); ctx.fill();

      // ── Sun rays (downward yellow arrows) ───────────────────────
      sunRays.forEach(r => {
        r.y += r.vy;
        if (r.y > ATM_TOP * CH) { r.dead = true; return; }
        const fade = Math.min(1, Math.min(r.y / (ATM_TOP*CH) * 4, (1 - r.y/(ATM_TOP*CH)) * 4));
        ctx.strokeStyle = `rgba(255,230,0,${r.alpha*fade*0.7})`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(r.x, r.y - r.len/2);
        ctx.lineTo(r.x, r.y + r.len/2);
        ctx.stroke();
        // arrowhead
        ctx.beginPath();
        ctx.moveTo(r.x-4, r.y+r.len/2-6);
        ctx.lineTo(r.x,   r.y+r.len/2);
        ctx.lineTo(r.x+4, r.y+r.len/2-6);
        ctx.stroke();
      });
      sunRays = sunRays.filter(r => !r.dead);

      // ── Atmosphere band ──────────────────────────────────────────
      const atmY  = ATM_TOP  * CH;
      const atmH  = (ATM_BOT - ATM_TOP) * CH;
      // Intensity from PPM
      const ppmFrac = Math.max(0, Math.min(1, (co2Ppm-280)/(800-280)));
      const atmAlpha = 0.15 + ppmFrac*0.45;
      const atmGrad = ctx.createLinearGradient(0, atmY, 0, atmY+atmH);
      atmGrad.addColorStop(0, `rgba(0,170,170,${atmAlpha})`);
      atmGrad.addColorStop(1, `rgba(0,85,85,${atmAlpha*0.5})`);
      ctx.fillStyle = atmGrad;
      ctx.fillRect(0, atmY, CW, atmH);

      // Atmosphere border lines
      ctx.strokeStyle = PAL[3];
      ctx.lineWidth = 1;
      ctx.setLineDash([6,4]);
      ctx.beginPath(); ctx.moveTo(0,atmY); ctx.lineTo(CW,atmY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,atmY+atmH); ctx.lineTo(CW,atmY+atmH); ctx.stroke();
      ctx.setLineDash([]);

      // Label
      ctx.font = `bold ${Math.floor(CH*0.028)}px 'VT323', monospace`;
      ctx.fillStyle = PAL[11];
      ctx.textAlign = 'left';
      ctx.fillText('ATMOSPHERE', 8, atmY + atmH*0.65);

      // ── CO2 molecule dots in atmosphere band ─────────────────────
      const numMolec = Math.floor(8 + ppmFrac*60);
      for (let i=0; i<numMolec; i++) {
        const mx = ((Math.sin(i*137.5)*0.5+0.5)) * CW;
        const my = atmY + ((Math.cos(i*97.3)*0.5+0.5)) * atmH;
        ctx.fillStyle = PAL[11];
        ctx.globalAlpha = 0.5 + 0.5*(Math.sin(i*23.1 + ts*0.001));
        ctx.beginPath(); ctx.arc(mx, my, 2.5, 0, Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha = 1;

      // ── IR arrows (rising red, some reflect, some escape) ─────────
      irArrows.forEach(r => {
        const atmYval = ATM_TOP * CH;
        if (!r.reflected && !r.escaped) {
          r.y += r.vy;
          if (r.y <= atmYval) {
            // Higher PPM = more reflection; low PPM lets more escape
            const reflectChance = 0.15 + ppmFrac * 0.80;
            if (Math.random() < reflectChance) {
              r.reflected = true;
              r.vy = Math.abs(r.vy);
            } else {
              // Escape to space — hand off to escapingIR
              escapingIR.push({ x: r.x, y: atmYval, vy: r.vy, alpha: 0.7 });
              r.dead = true;
            }
          }
        } else if (r.reflected) {
          r.y += r.vy;
          if (r.y >= GROUND_TOP * CH) r.dead = true;
        }
        if (r.dead) return;
        const col   = r.reflected ? PAL[4] : PAL[12];
        const dir   = r.reflected ? 1 : -1;
        const alpha = r.reflected ? 0.7 : 0.85;
        ctx.strokeStyle = col.replace(')', `,${alpha})`).replace('rgb(','rgba(');
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(r.x, r.y); ctx.lineTo(r.x, r.y+dir*16); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(r.x-4, r.y+dir*16-dir*6);
        ctx.lineTo(r.x,   r.y+dir*16);
        ctx.lineTo(r.x+4, r.y+dir*16-dir*6);
        ctx.stroke();
      });
      irArrows = irArrows.filter(r => !r.dead);

      // ── Escaping IR (dim, fading upward past atmosphere) ────────────
      escapingIR.forEach(r => {
        r.y += r.vy;          // still moving upward (vy is negative)
        r.alpha -= 0.015;
        if (r.alpha <= 0 || r.y < -20) { r.dead = true; return; }
        ctx.strokeStyle = `rgba(255,100,100,${r.alpha})`;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(r.x, r.y); ctx.lineTo(r.x, r.y-16); ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(r.x-3, r.y-10); ctx.lineTo(r.x, r.y-16); ctx.lineTo(r.x+3, r.y-10);
        ctx.stroke();
      });
      escapingIR = escapingIR.filter(r => !r.dead);

      // ── CO2 molecule particles rising ────────────────────────────
      co2Particles.forEach(p => {
        p.x  += p.vx;
        p.y  += p.vy;
        const ceiling = ATM_TOP * CH;
        const floor   = ATM_BOT  * CH;
        // Hard clamp — bounce/stop at atmosphere ceiling
        if (p.y < ceiling) {
          p.y  = ceiling;
          p.vy = 0;        // stop rising
          p.vx *= 0.95;    // drift slowly sideways and fade
          p.alpha -= 0.02;
        }
        if (p.alpha <= 0 || p.x < 0 || p.x > CW) { p.dead = true; return; }

        const fade = Math.min(1, (p.y - ceiling) / (floor - ceiling) * 3);
        ctx.fillStyle = PAL[11];
        ctx.globalAlpha = p.alpha * Math.max(0.05, fade);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fill();
        ctx.font = `${Math.floor(CH*0.018)}px 'VT323', monospace`;
        ctx.fillStyle = PAL[11];
        ctx.textAlign = 'center';
        ctx.globalAlpha = p.alpha * Math.max(0.05, fade) * 0.8;
        ctx.fillText('o', p.x, p.y + p.r*0.4);
      });
      co2Particles = co2Particles.filter(p => !p.dead);
      ctx.globalAlpha = 1;

      // ── Ground ───────────────────────────────────────────────────
      const grdY = GROUND_TOP * CH;
      const grdGrad = ctx.createLinearGradient(0, grdY, 0, CH);
      grdGrad.addColorStop(0, '#3A2200');
      grdGrad.addColorStop(1, '#1A0A00');
      ctx.fillStyle = grdGrad;
      ctx.fillRect(0, grdY, CW, CH - grdY);

      // Ground texture line
      ctx.strokeStyle = PAL[6];
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(0, grdY); ctx.lineTo(CW, grdY); ctx.stroke();

      // ── Scene elements ───────────────────────────────────────────
      const sceneY  = ATM_BOT * CH;
      const sceneH  = (GROUND_TOP - ATM_BOT) * CH;
      const drawSz  = Math.min(80, sceneH * 0.45); // fixed small size, max 80px
      // anchor icons to the ground line, centred in the scene strip
      const iconBaseY = grdY;
      const iconTopY  = iconBaseY - drawSz;

      REGION_X.forEach((rx, ri) => {
        const cx   = rx * CW;
        const isOn = co2Active[ri];
        const isSel= ri === co2Sel;

        if (ri === 0) drawForest(cx, iconTopY, drawSz, isOn, ts);
        if (ri === 1) drawVolcano(cx, iconTopY, drawSz, isOn, ts);
        if (ri === 2) drawCity(cx, iconTopY, drawSz, isOn, ts);

        // Selector box below ground
        const boxY = grdY + CH*0.02;
        const boxH = CH*0.075;
        const boxW = CW*0.22;
        const boxX = cx - boxW/2;

        ctx.strokeStyle = isSel ? PAL[14] : PAL[8];
        ctx.lineWidth   = isSel ? 2 : 1;
        ctx.strokeRect(boxX, boxY, boxW, boxH);

        if (isSel) {
          ctx.fillStyle = 'rgba(80,60,0,0.4)';
          ctx.fillRect(boxX, boxY, boxW, boxH);
        }

        // Toggle indicator
        ctx.font = `bold ${Math.floor(CH*0.032)}px 'VT323', monospace`;
        ctx.textAlign = 'center';
        ctx.fillStyle = isOn ? PAL[10] : PAL[8];
        ctx.fillText(isOn ? '[ ON ]' : '[ -- ]', cx, boxY + boxH*0.55);

        // Rate hint
        ctx.font = `${Math.floor(CH*0.024)}px 'VT323', monospace`;
        ctx.fillStyle = isSel ? PAL[14] : PAL[8];
        ctx.fillText(REGION_RATES[ri], cx, boxY + boxH*0.92);
      });

      // ── HUD: readouts ────────────────────────────────────────────
      const hudSize = Math.floor(CH * 0.038);
      ctx.font = `bold ${hudSize}px 'VT323', monospace`;

      // PPM
      ctx.textAlign = 'left';
      ctx.fillStyle = ppmFrac > 0.6 ? PAL[12] : ppmFrac > 0.3 ? PAL[14] : PAL[11];
      ctx.fillText('CO₂ PPM: ' + co2Ppm.toFixed(1), CW*0.02, CH*0.04);

      // PPM bar
      const barX=CW*0.02, barY=CH*0.07, barW=CW*0.35, barHt=CH*0.018;
      ctx.strokeStyle = PAL[8]; ctx.lineWidth=1;
      ctx.strokeRect(barX, barY, barW, barHt);
      ctx.fillStyle = ppmFrac>0.6?PAL[12]:ppmFrac>0.3?PAL[14]:PAL[10];
      ctx.fillRect(barX, barY, barW*ppmFrac, barHt);

      // Temp
      const tempFrac = Math.max(0,Math.min(1,(co2Temp+2)/8));
      ctx.fillStyle = co2Temp > 3 ? PAL[12] : co2Temp > 1 ? PAL[14] : PAL[11];
      ctx.textAlign = 'right';
      const tSign = co2Temp >= 0 ? '+' : '';
      ctx.fillText('GLOBAL TEMP: ' + tSign + co2Temp.toFixed(2) + '°C', CW*0.98, CH*0.04);

      // Temp bar
      const tBarX=CW*0.63, tBarY=CH*0.07, tBarW=CW*0.35;
      ctx.strokeStyle=PAL[8]; ctx.lineWidth=1;
      ctx.strokeRect(tBarX, tBarY, tBarW, barHt);
      ctx.fillStyle=co2Temp>3?PAL[12]:co2Temp>1?PAL[14]:PAL[10];
      ctx.fillRect(tBarX, tBarY, tBarW*tempFrac, barHt);

      // ── Task row: between selectors and controls hint ───────────
      if (co2TaskPhase === 0 || co2TaskPhase === 1) {
        // Check phase advance
        if (co2TaskPhase === 0 && co2Temp >= 5.9) {
          co2TaskPhase = 1;
          co2Active = [false,false,false];
        }
        if (co2TaskPhase === 1 && co2Temp <= -3.0) {
          co2TaskPhase = 2;
          co2Active = [false,false,false];
        }
        const target = co2TaskPhase === 0 ? 'RAISE Global Temp to +6°C' : 'LOWER Global Temp to −3°C';
        const prog   = co2TaskPhase === 0
          ? Math.max(0, Math.min(1, (co2Temp - 1.1) / 4.9))
          : Math.max(0, Math.min(1, (1.1 - co2Temp) / 4.1));
        // Row sits just below selector boxes, above controls hint
        const selBoxBot = grdY + CH*0.02 + CH*0.075; // bottom of selector row
        const rowY      = selBoxBot + CH*0.008;        // small gap
        const rowH      = CH*0.052;
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(CW*0.02, rowY, CW*0.96, rowH);
        ctx.strokeStyle = PAL[14]; ctx.lineWidth = 1;
        ctx.strokeRect(CW*0.02, rowY, CW*0.96, rowH);
        // Task label (left) + progress bar (right)
        ctx.font = `bold ${Math.floor(CH*0.030)}px 'VT323', monospace`;
        ctx.fillStyle = PAL[14]; ctx.textAlign = 'left';
        ctx.fillText('TASK ' + (co2TaskPhase+1) + ' of 2:  ' + target, CW*0.04, rowY + rowH*0.62);
        // Progress bar right side
        const bx=CW*0.52, by=rowY+rowH*0.28, bw=CW*0.44, bh=rowH*0.42;
        ctx.strokeStyle=PAL[8]; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);
        ctx.fillStyle=prog>0.8?PAL[12]:prog>0.4?PAL[14]:PAL[10];
        ctx.fillRect(bx, by, bw*prog, bh);
        ctx.font=`${Math.floor(CH*0.024)}px 'VT323', monospace`;
        ctx.fillStyle=PAL[8]; ctx.textAlign='right';
        ctx.fillText(Math.round(prog*100)+'%', bx+bw-2, rowY+rowH*0.72);
      } else if (co2TaskPhase === 2) {
        // Quiz overlay
        const Q = CO2_QUESTIONS[co2QuizIdx];
        ctx.fillStyle='rgba(0,0,0,0.82)';
        ctx.fillRect(0,0,CW,CH);
        ctx.font=`bold ${Math.floor(CH*0.042)}px 'VT323', monospace`;
        ctx.fillStyle=PAL[14]; ctx.textAlign='center';
        ctx.fillText('QUESTION ' + (co2QuizIdx+1) + ' of ' + CO2_QUESTIONS.length, CW/2, CH*0.18);
        // Word-wrap question (simple: split at spaces, ~50 chars/line)
        const words = Q.q.split(' ');
        let line='', lines=[], maxW=CW*0.75;
        ctx.font=`${Math.floor(CH*0.038)}px 'VT323', monospace`;
        for (const w of words) {
          const test = line ? line+' '+w : w;
          if (ctx.measureText(test).width > maxW && line) { lines.push(line); line=w; }
          else line=test;
        }
        if (line) lines.push(line);
        ctx.fillStyle=PAL[15];
        lines.forEach((l,i)=>ctx.fillText(l, CW/2, CH*0.28+i*CH*0.055));
        // Options
        Q.opts.forEach((opt,i)=>{
          const oy = CH*0.48 + i*CH*0.10;
          const isSelected = i===co2QuizSel;
          ctx.fillStyle = isSelected ? 'rgba(80,60,0,0.6)' : 'rgba(20,20,40,0.6)';
          ctx.fillRect(CW*0.15, oy-CH*0.038, CW*0.70, CH*0.07);
          ctx.strokeStyle = isSelected ? PAL[14] : PAL[8];
          ctx.lineWidth = isSelected ? 2 : 1;
          ctx.strokeRect(CW*0.15, oy-CH*0.038, CW*0.70, CH*0.07);
          ctx.font=`${Math.floor(CH*0.036)}px 'VT323', monospace`;
          ctx.fillStyle = isSelected ? PAL[14] : PAL[7];
          ctx.fillText((isSelected ? '► ' : '  ') + opt, CW/2, oy);
        });
        ctx.font=`${Math.floor(CH*0.026)}px 'VT323', monospace`;
        ctx.fillStyle=PAL[7]; ctx.textAlign='center';
        ctx.fillText('◄ ► / ▲ ▼ navigate    ENTER confirm', CW/2, CH*0.96);
      } else if (co2TaskPhase === 3) {
        ctx.fillStyle='rgba(0,0,0,0.82)';
        ctx.fillRect(0,0,CW,CH);
        ctx.font=`bold ${Math.floor(CH*0.052)}px 'VT323', monospace`;
        ctx.textAlign='center';
        if (co2AllCorrect) {
          ctx.fillStyle=PAL[10];
          ctx.fillText('★  ALL CORRECT!  ★', CW/2, CH*0.20);
          ctx.font=`${Math.floor(CH*0.036)}px 'VT323', monospace`;
          ctx.fillStyle=PAL[14];
          ctx.fillText('★ Star earned! Return to the menu.', CW/2, CH*0.30);
        } else {
          ctx.fillStyle=PAL[12];
          ctx.fillText('✗  Incorrect answers.', CW/2, CH*0.18);
          ctx.font=`${Math.floor(CH*0.032)}px 'VT323', monospace`;
          ctx.fillStyle=PAL[14];
          ctx.fillText('No star awarded. Redo the activity to earn it.', CW/2, CH*0.27);
          ctx.font=`${Math.floor(CH*0.028)}px 'VT323', monospace`;
          ctx.fillStyle=PAL[7];
          ctx.fillText('Correct answers:', CW/2, CH*0.35);
          CO2_QUESTIONS.forEach((q,i)=>{
            const correct = co2QuizAnswers[i]===q.ans;
            ctx.fillStyle = correct ? PAL[10] : PAL[12];
            ctx.fillText((correct?'✓':'✗')+' Q'+(i+1)+': '+q.opts[q.ans], CW/2, CH*0.42+i*CH*0.082);
          });
        }
        ctx.font=`${Math.floor(CH*0.028)}px 'VT323', monospace`;
        ctx.fillStyle=PAL[7];
        ctx.fillText('[ ENTER ] return to menu', CW/2, CH*0.92);
      }

      // ── Controls hint ────────────────────────────────────────────
      if (co2TaskPhase < 2) {
        ctx.font = `${Math.floor(CH*0.028)}px 'VT323', monospace`;
        ctx.fillStyle = PAL[7];
        ctx.textAlign = 'center';
        ctx.fillText('◄ ► select region    ENTER toggle on/off    ESC menu', CW/2, CH*0.975);
      }

      // ── Legend ───────────────────────────────────────────────────
      ctx.font = `${Math.floor(CH*0.025)}px 'VT323', monospace`;
      ctx.fillStyle = PAL[14]; ctx.textAlign='left';
      ctx.fillText('↓ solar', CW*0.38, CH*0.04);
      ctx.fillStyle = PAL[12];
      ctx.fillText('↑ IR heat', CW*0.50, CH*0.04);
      ctx.fillStyle = PAL[4];
      ctx.fillText('↓ reflected', CW*0.62, CH*0.04);
    }

    // ── Scene element drawers ─────────────────────────────────────────
    function drawForest(cx, sceneY, sceneH, active, ts) {
      const treeH = sceneH * 0.85;
      const trunkW = sceneH * 0.06;
      const offsets = [-sceneH*0.18, 0, sceneH*0.18];
      offsets.forEach((ox, i) => {
        const tx = cx + ox;
        const baseY = sceneY + sceneH;
        // trunk
        ctx.fillStyle = PAL[6];
        ctx.fillRect(tx - trunkW/2, baseY - treeH*0.35, trunkW, treeH*0.35);
        // canopy layers
        const layers = 3;
        for (let l=0; l<layers; l++) {
          const ly  = baseY - treeH*0.25 - l*treeH*0.22;
          const lw  = (sceneH*0.22) * (1 - l*0.2);
          ctx.fillStyle = active
            ? `rgb(0,${140+l*30},0)`
            : `rgb(0,${80+l*20},0)`;
          ctx.beginPath();
          ctx.moveTo(tx, ly - treeH*0.22);
          ctx.lineTo(tx + lw, ly);
          ctx.lineTo(tx - lw, ly);
          ctx.closePath();
          ctx.fill();
        }
      });
      // label
      ctx.font = `${Math.floor(sceneH*0.22)}px 'VT323', monospace`;
      ctx.fillStyle = active ? PAL[10] : PAL[2];
      ctx.textAlign = 'center';
      ctx.fillText('FOREST', cx, sceneY + sceneH * 1.0);
    }

    function drawVolcano(cx, sceneY, sceneH, active, ts) {
      const baseY = sceneY + sceneH;
      const vW = sceneH * 0.7;
      const vH = sceneH * 0.9;
      // body
      ctx.fillStyle = PAL[4];
      ctx.beginPath();
      ctx.moveTo(cx - vW/2, baseY);
      ctx.lineTo(cx + vW/2, baseY);
      ctx.lineTo(cx + vW*0.12, baseY - vH);
      ctx.lineTo(cx - vW*0.12, baseY - vH);
      ctx.closePath();
      ctx.fill();
      // darker shading
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.moveTo(cx + vW*0.05, baseY - vH);
      ctx.lineTo(cx + vW/2, baseY);
      ctx.lineTo(cx, baseY);
      ctx.closePath();
      ctx.fill();
      // crater
      ctx.fillStyle = active ? PAL[14] : '#330000';
      ctx.beginPath();
      ctx.ellipse(cx, baseY-vH, vW*0.12, vH*0.04, 0, 0, Math.PI*2);
      ctx.fill();
      // lava glow when active
      if (active) {
        const lavaGlow = ctx.createRadialGradient(cx, baseY-vH, 0, cx, baseY-vH, vW*0.25);
        lavaGlow.addColorStop(0,'rgba(255,100,0,0.6)');
        lavaGlow.addColorStop(1,'rgba(255,100,0,0)');
        ctx.fillStyle = lavaGlow;
        ctx.beginPath(); ctx.arc(cx, baseY-vH, vW*0.25, 0, Math.PI*2); ctx.fill();
      }
      // label
      ctx.font = `${Math.floor(sceneH*0.22)}px 'VT323', monospace`;
      ctx.fillStyle = active ? PAL[14] : PAL[4];
      ctx.textAlign = 'center';
      ctx.fillText('VOLCANO', cx, sceneY + sceneH * 1.0);
    }

    function drawCity(cx, sceneY, sceneH, active, ts) {
      const baseY = sceneY + sceneH;
      const buildings = [
        { ox:-sceneH*0.22, w:sceneH*0.12, h:sceneH*0.55 },
        { ox:-sceneH*0.08, w:sceneH*0.10, h:sceneH*0.75 },
        { ox: sceneH*0.04, w:sceneH*0.13, h:sceneH*0.60 },
        { ox: sceneH*0.18, w:sceneH*0.10, h:sceneH*0.45 },
      ];
      buildings.forEach((b,i) => {
        const bx = cx + b.ox - b.w/2;
        ctx.fillStyle = active ? PAL[7] : PAL[8];
        ctx.fillRect(bx, baseY - b.h, b.w, b.h);
        // windows
        ctx.fillStyle = active ? PAL[14] : PAL[8];
        for (let wr=0; wr<3; wr++) {
          for (let wc=0; wc<2; wc++) {
            const wx = bx + b.w*0.15 + wc*b.w*0.45;
            const wy = baseY - b.h*0.85 + wr*b.h*0.23;
            const lit = active && ((Math.floor(ts/400)+i+wr+wc)%3 !== 0);
            ctx.fillStyle = lit ? PAL[14] : '#111';
            ctx.fillRect(wx, wy, b.w*0.28, b.h*0.13);
          }
        }
      });
      // label
      ctx.font = `${Math.floor(sceneH*0.22)}px 'VT323', monospace`;
      ctx.fillStyle = active ? PAL[15] : PAL[7];
      ctx.textAlign = 'center';
      ctx.fillText('CITY', cx, sceneY + sceneH * 1.0);
    }

    // ================================================================
    // Main text-mode draw loop
    // ================================================================
    function draw() {
      const G = Array.from({length:H},()=>Array.from({length:W},()=>[' ',15,false]));
      BORDER.forEach(([r,c],i)=>{
        const isCorner=(r===0||r===H-1)&&(c===0||c===W-1);
        const pi=((i-tick)%BORDER_PAT.length+BORDER_PAT.length)%BORDER_PAT.length;
        const ci=((i+Math.floor(tick/2))%BORDER_COLS.length+BORDER_COLS.length)%BORDER_COLS.length;
        G[r][c]=[isCorner?'█':BORDER_PAT[pi],BORDER_COLS[ci],false];
      });
      if      (state==='loading')        drawLoading(G);
      else if (state==='menu')           drawMenu(G);
      else if (state==='glaciers-intro') drawGlaciersIntro(G);
      else if (state==='glaciers-sim')   drawGlaciersSim(G);
      else if (state==='glaciers-graph') drawGlaciersGraph(G);
      else if (state==='co2-intro')      drawCO2Intro(G);
      else if (state==='albedo-intro')    drawAlbedoIntro(G);
      else if (state==='name-entry')       drawNameEntry(G);

      document.getElementById('screen').innerHTML =
        G.map(row=>row.map(([ch,c,bl])=>{
          const safe=ch==='&'?'&amp;':ch==='<'?'&lt;':ch==='>'?'&gt;':ch;
          return `<span class="c${c}${bl?' blink':''}">${safe}</span>`;
        }).join('')).join('\n');

      tick++;
    }

    // ── Canvas loop ───────────────────────────────────────────────────
    function co2Loop(ts) {
      const isCanvas = state === 'co2-sim' || state === 'albedo-sim';
      document.getElementById('screen').style.display = isCanvas ? 'none' : '';
      if (state === 'co2-sim') {
        canvas.style.display = 'block';
        albedoCanvas.style.display = 'none';
        resizeCanvas();
        drawCO2Canvas(ts);
      } else if (state === 'albedo-sim') {
        canvas.style.display = 'none';
        albedoCanvas.style.display = 'block';
        if (albedoCanvas.width!==window.innerWidth||albedoCanvas.height!==window.innerHeight) {
          albedoCanvas.width=window.innerWidth; albedoCanvas.height=window.innerHeight;
        }
        drawAlbedoCanvas(ts);
      } else {
        canvas.style.display = 'none';
        albedoCanvas.style.display = 'none';
      }
      requestAnimationFrame(co2Loop);
    }

    function resizeCanvas() {
      if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }
    }

    function resize() {
      const s=document.getElementById('screen');
      const byW=(window.innerWidth*0.94)/(W*0.555);
      const byH=(window.innerHeight*0.94)/(H*1.15);
      s.style.fontSize=Math.max(13,Math.floor(Math.min(byW,byH)))+'px';
    }

    window.addEventListener('resize', () => { resize(); resizeCanvas(); });
    resize();
    resizeCanvas();
    setInterval(draw, 80);
    draw();
    requestAnimationFrame(co2Loop);
  </script>
</body>
</html>
